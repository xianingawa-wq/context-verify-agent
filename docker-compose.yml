version: "3.8"

services:
  spring-backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: contract-backend-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contract_agent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AGENT_RPC_PROVIDER: ${AGENT_RPC_PROVIDER:-grpc}
      AGENT_GRPC_TARGET: agent-python:50051
      AGENT_RPC_TIMEOUT_MILLIS: ${AGENT_RPC_TIMEOUT_MILLIS:-15000}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - agent-python

  agent-python:
    build:
      context: .
      dockerfile: app/agent_rpc/Dockerfile
    container_name: contract-agent-python
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_CHAT_MODEL: ${QWEN_CHAT_MODEL:-qwen-max}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL:-text-embedding-v4}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-milvus}
      MILVUS_URI: http://milvus:19530
      POSTGRES_DSN: postgresql+psycopg://postgres:postgres@postgres:5432/contract_agent
    ports:
      - "50051:50051"
    depends_on:
      - postgres
      - milvus

  postgres:
    image: postgres:16
    container_name: contract-agent-postgres
    environment:
      POSTGRES_DB: contract_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    ports:
      - "9001:9000"
    volumes:
      - minio_data:/minio_data

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
